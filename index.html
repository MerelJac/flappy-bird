<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── Start Screen ── -->
    <div id="start-screen" class="screen active">
      <div class="logo-placeholder">Salmon Run</div>
      <div class=""><img src="./salmon.png" alt="Salmon" /></div>
      <p class="tap-hint">Try to avoid fishing nets and other obstacles!</p>
      <button class="btn btn-start" id="btn-start">Play</button>
    </div>

    <!-- ── Game Screen ── -->
    <div id="game-screen" class="screen">
      <div id="info-display"></div>
      <div id="score-display">0</div>
      <div id="countdown-display"></div>
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- ── End Screen ── -->
    <div id="end-screen" class="screen">
      <div class="end-panel">
        <div class="end-title">Game Over</div>
        <div class="medal-placeholder">Medal</div>
        <div class="divider"></div>
        <div class="score-label">Score</div>
        <div class="score-value" id="final-score">0</div>
        <div class="divider"></div>
        <div class="score-label">Best</div>
        <div class="best-value" id="best-score">0</div>
      </div>
      <button class="btn btn-restart" id="btn-restart">Play Again</button>
    </div>

    <script>
      // ── Screen management ──────────────────────────────────────────────────────
      const screens = {
        start: document.getElementById("start-screen"),
        game: document.getElementById("game-screen"),
        end: document.getElementById("end-screen"),
      };

      function showScreen(name) {
        Object.values(screens).forEach((s) => s.classList.remove("active"));
        screens[name].classList.add("active");
      }

      // ── Canvas setup ───────────────────────────────────────────────────────────
      const canvas = document.getElementById("game-canvas");
      const ctx = canvas.getContext("2d");

      let GAME_W = window.innerWidth;
      let GAME_H = window.innerHeight;

      function resizeCanvas() {
        GAME_W = window.innerWidth;
        GAME_H = window.innerHeight;
        canvas.width = GAME_W;
        canvas.height = GAME_H;
        canvas.style.width = `${GAME_W}px`;
        canvas.style.height = `${GAME_H}px`;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // ── Game constants ─────────────────────────────────────────────────────────
      const GRAVITY = 0.2;
      const FLAP_VEL = -5;
      const PIPE_SPEED = 3;
      const PIPE_GAP = 160;
      const PIPE_WIDTH = 52;
      const PIPE_SPAWN_X = () => GAME_W + 60;
      const PIPE_INTERVAL = 90; // frames
      const NET_H = 35; // height of the net at the ocean floor
      const BOAT_W = 80;
      const BOAT_H = 50;
      const OCEAN_TOP = () => Math.round(GAME_H * 0.43); // white water-surface line in background.png
      const TRASH_W = 32;
      const TRASH_H = 32;
      const TRASH_INTERVAL = 55; // frames between trash spawns
      const SALMON = "./salmon.png"; // placeholder, swap with actual image later

      // Placeholder colours (swap with images later)
      const COLOR = {
        sky: "#87ceeb",
        ground: "#c8a96e",
        groundTop: "#5c8a3c",
        pipe: "#5ec25e",
        pipeBorder: "#3a8a3a",
        bird: "#f7b731",
        birdEye: "#fff",
        birdPupil: "#333",
        birdBeak: "#e87b1e",
      };

      // ── Informationals ────────────────────────────────────────────────────────
      const FACTS = [
        "8 million tonnes of plastic enter the ocean every year.",
        "Salmon can detect their home river by smell alone.",
        "Ghost nets account for 46% of the Great Pacific Garbage Patch.",
        "Pacific salmon die after spawning — feeding the whole forest.",
        "A single plastic bag can kill sea turtles who mistake it for jellyfish.",
        "Salmon navigate using Earth's magnetic field.",
        "Ocean plastic harms over 700 marine species.",
        "Farmed salmon are fed wild-caught fish, straining ocean stocks.",
        "Microplastics have been found in salmon tissue worldwide.",
        "Healthy salmon runs bring vital nutrients from sea to land.",
        "It takes 450 years for a plastic bottle to decompose at sea.",
        "Salmon can leap up to 3.5 metres to climb waterfalls.",
      ];

      const infoEl = document.getElementById("info-display");
      let infoTimeout = null;
      let infoQueue = [];
      let infoIndex = 0;

      function startInfoRotation() {
        // Shuffle a copy of the facts for this game
        infoQueue = [...FACTS].sort(() => Math.random() - 0.5);
        infoIndex = 0;
        showNextFact();
      }

      function showNextFact() {
        infoEl.classList.add("fade");
        infoTimeout = setTimeout(() => {
          infoEl.textContent = infoQueue[infoIndex % infoQueue.length];
          infoEl.classList.remove("fade");
          infoIndex++;
          infoTimeout = setTimeout(showNextFact, 5000);
        }, 400);
      }

      function stopInfoRotation() {
        clearTimeout(infoTimeout);
        infoEl.textContent = "";
      }

      // ── State ──────────────────────────────────────────────────────────────────
      let state,
        bird,
        pipes,
        trashItems,
        score,
        frame,
        bestScore = 0;

      function resetGame() {
        // 'countdown' | 'running' | 'dead'
        state = "countdown";
        bird = { x: 80, y: GAME_H / 2 - 20, vy: 0, w: 38, h: 28, angle: 0 };
        pipes = [];
        trashItems = [];
        score = 0;
        frame = 0;
        document.getElementById("score-display").textContent = "0";
        stopInfoRotation();
        startInfoRotation();
      }

      // ── Input ──────────────────────────────────────────────────────────────────
      function flap() {
        if (state === "running") bird.vy = FLAP_VEL;
      }

      // Desktop click / laptop trackpad
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        flap();
      });

      // ── Drawing helpers ────────────────────────────────────────────────────────
      function drawBackground() {
  {
          // Fallback while image loads
          ctx.fillStyle = COLOR.sky;
          ctx.fillRect(0, 0, GAME_W, OCEAN_TOP());
          ctx.fillStyle = "#1a6fa8";
          ctx.fillRect(0, OCEAN_TOP(), GAME_W, GROUND_Y() - OCEAN_TOP());
          ctx.fillStyle = COLOR.ground;
          ctx.fillRect(0, GROUND_Y(), GAME_W, GAME_H - GROUND_Y());
        }
      }

      function drawPipe(pipe) {
        // Boat image sitting at the water surface (bottom of boat = pipe.topH)
        const boatX = pipe.x + PIPE_WIDTH / 2 - BOAT_W / 2;
        const boatY = pipe.topH - BOAT_H;
        if (boatImg.complete && boatImg.naturalWidth > 0) {
          ctx.drawImage(boatImg, boatX, boatY, BOAT_W, BOAT_H);
        } else {
          ctx.fillStyle = COLOR.pipe;
          ctx.fillRect(pipe.x - 4, boatY, PIPE_WIDTH + 8, BOAT_H);
        }

        // Wire from boat down to net
        const wireX = pipe.x + PIPE_WIDTH / 2;
        ctx.beginPath();
        ctx.moveTo(wireX, pipe.topH);
        ctx.lineTo(wireX, GROUND_Y() - NET_H);
        ctx.strokeStyle = "#aaaaaa";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Net at ocean floor
        const netX = pipe.x - 4;
        const netY = GROUND_Y() - NET_H;
        const netW = PIPE_WIDTH + 8;

        // Grid lines
        ctx.strokeStyle = "#777";
        ctx.lineWidth = 1;
        const cols = 5;
        for (let i = 0; i <= cols; i++) {
          const lx = netX + (netW / cols) * i;
          ctx.beginPath();
          ctx.moveTo(lx, netY);
          ctx.lineTo(lx, GROUND_Y());
          ctx.stroke();
        }
        const rows = 3;
        for (let i = 0; i <= rows; i++) {
          const ly = netY + (NET_H / rows) * i;
          ctx.beginPath();
          ctx.moveTo(netX, ly);
          ctx.lineTo(netX + netW, ly);
          ctx.stroke();
        }
        // Net border
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 2;
        ctx.strokeRect(netX, netY, netW, NET_H);
      }
      const fishImg = new Image();
      fishImg.src = SALMON;
      const boatImg = new Image();
      boatImg.src = "./boat.png";
      const bgImg = new Image();
      bgImg.src = "./background.png";
      // ── Add more filenames here as you provide images ──
      const TRASH_SRCS = ["./trash.png", "./trash-2.png", "./trash-3.png"];
      const trashImgs = TRASH_SRCS.map((src) => {
        const img = new Image();
        img.src = src;
        return img;
      });

      function drawFish() {
        ctx.save();
        ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);

        // Tilt up when flapping, nose-down when falling
        const targetAngle = bird.vy < 0 ? -0.4 : Math.min(bird.vy * 0.07, 1.2);
        bird.angle += (targetAngle - bird.angle) * 0.15;
        ctx.rotate(bird.angle);

        if (fishImg.complete && fishImg.naturalWidth > 0) {
          // Draw the fish image centred on the bird's position
          ctx.drawImage(fishImg, -bird.w / 2, -bird.h / 2, bird.w, bird.h);
        } else {
          // Fallback: simple coloured ellipse while image loads (or if missing)
          ctx.fillStyle = "#f7b731";
          ctx.beginPath();
          ctx.ellipse(0, 0, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawTrashItems() {
        for (const t of trashItems) {
          const img = trashImgs[t.imgIdx];
          if (img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, t.x, t.y, TRASH_W, TRASH_H);
          } else {
            ctx.fillStyle = "#8B4513";
            ctx.fillRect(t.x, t.y, TRASH_W, TRASH_H);
          }
        }
      }

      function drawScore() {
        document.getElementById("score-display").textContent = score;
      }

      // ── Collision ──────────────────────────────────────────────────────────────
      const GROUND_Y = () => Math.round(GAME_H * 0.88);
      const MARGIN = 4; // pixel forgiveness

      function checkCollision() {
        const bx = bird.x + MARGIN;
        const by = bird.y + MARGIN;
        const bw = bird.w - MARGIN * 2;
        const bh = bird.h - MARGIN * 2;

        // Ground / ceiling
        if (bird.y + bird.h >= GROUND_Y() || bird.y <= OCEAN_TOP()) return true;

        for (const p of pipes) {
          // Top pipe (boat) collision
          const inX = bx < p.x + PIPE_WIDTH && bx + bw > p.x;
          if (inX && by < p.topH) return true;

          // Net collision (wire is passable — only the net at the floor is deadly)
          const netX = p.x - 4;
          const netW = PIPE_WIDTH + 8;
          const netY = GROUND_Y() - NET_H;
          const inNetX = bx < netX + netW && bx + bw > netX;
          if (inNetX && by + bh > netY) return true;
        }

        // Trash collision
        for (const t of trashItems) {
          if (
            bx < t.x + TRASH_W &&
            bx + bw > t.x &&
            by < t.y + TRASH_H &&
            by + bh > t.y
          )
            return true;
        }

        return false;
      }

      // ── Countdown ──────────────────────────────────────────────────────────────
      const countdownEl = document.getElementById("countdown-display");

      function startCountdown(callback) {
        let count = 3;

        function showNumber(text, onDone) {
          countdownEl.style.transition = "none";
          countdownEl.style.opacity = "1";
          countdownEl.style.transform = "translate(-50%, -50%) scale(1.4)";
          countdownEl.textContent = text;

          // trigger reflow so transition applies
          countdownEl.getBoundingClientRect();

          countdownEl.style.transition =
            "transform 0.8s ease-out, opacity 0.8s ease-out";
          countdownEl.style.transform = "translate(-50%, -50%) scale(0.9)";
          countdownEl.style.opacity = "0";

          setTimeout(onDone, 900);
        }

        function tick() {
          if (count > 0) {
            showNumber(String(count), () => {
              count--;
              tick();
            });
          } else {
            showNumber("GO!", () => {
              countdownEl.style.transition = "none";
              countdownEl.style.opacity = "0";
              callback();
            });
          }
        }

        tick();
      }

      // ── Game loop ──────────────────────────────────────────────────────────────
      function update() {
        frame++;

        // Spawn pipes
        if (frame % PIPE_INTERVAL === 0) {
          pipes.push({ x: PIPE_SPAWN_X(), topH: OCEAN_TOP(), scored: false });
        }

        // Move pipes
        for (const p of pipes) {
          p.x -= PIPE_SPEED;
          if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
            p.scored = true;
            score++;
          }
        }

        // Remove off-screen pipes
        pipes = pipes.filter((p) => p.x + PIPE_WIDTH + 8 > 0);

        // Spawn trash at random heights within the water column
        if (frame % TRASH_INTERVAL === 0) {
          const minY = OCEAN_TOP() + 10;
          const maxY = GROUND_Y() - NET_H - TRASH_H - 10;
          const imgIdx = Math.floor(Math.random() * trashImgs.length);
          trashItems.push({
            x: PIPE_SPAWN_X(),
            y: minY + Math.random() * (maxY - minY),
            imgIdx,
          });
        }

        // Move and cull trash
        for (const t of trashItems) t.x -= PIPE_SPEED;
        trashItems = trashItems.filter((t) => t.x + TRASH_W > 0);

        // Bird physics
        bird.vy += GRAVITY;
        bird.y += bird.vy;

        if (checkCollision()) state = "dead";
      }

      function render() {
        ctx.clearRect(0, 0, GAME_W, GAME_H);
        // drawBackground();
        pipes.forEach(drawPipe);
        drawTrashItems();
        drawFish();
        drawScore();
      }

      let animId;

      function togglePause() {
        if (state === "running") {
          state = "paused";
          cancelAnimationFrame(animId);
          // Draw a pause overlay
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fillRect(0, 0, GAME_W, GAME_H);
          ctx.fillStyle = "#fff";
          ctx.font = "bold 36px Arial";
          ctx.textAlign = "center";
          ctx.fillText("PAUSED", GAME_W / 2, GAME_H / 2);
        } else if (state === "paused") {
          state = "running";
          animId = requestAnimationFrame(gameLoop);
        }
      }

      function startGame() {
        showScreen("game");
        resetGame();
        cancelAnimationFrame(animId);
        animId = requestAnimationFrame(gameLoop);
        startCountdown(() => {
          state = "running";
        });
      }

      // ── Game loop ──────────────────────────────────────────────────────────────
      function gameLoop() {
        if (state === "running") {
          update();
          render();
          animId = requestAnimationFrame(gameLoop);
        } else if (state === "countdown") {
          render(); // draw static scene while counting down
          animId = requestAnimationFrame(gameLoop);
        } else if (state === "paused") {
          // do nothing — loop is stopped
        } else {
          render();
          endGame();
        }
      }

      function endGame() {
        cancelAnimationFrame(animId);
        stopInfoRotation();
        if (score > bestScore) bestScore = score;
        document.getElementById("final-score").textContent = score;
        document.getElementById("best-score").textContent = bestScore;
        setTimeout(() => showScreen("end"), 600);
      }

      // ── Button wiring ──────────────────────────────────────────────────────────
      document.getElementById("btn-start").addEventListener("click", () => {
        startGame();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "p" || e.key === "P" || e.key === "Escape") togglePause();
        if (e.key === " " || e.key === "ArrowUp") flap();
      });

      document.getElementById("btn-restart").addEventListener("click", () => {
        startGame();
      });
    </script>
  </body>
</html>
